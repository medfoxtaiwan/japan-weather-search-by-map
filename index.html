<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本天気予報 — Japan Weather</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: #1a1a2e;
    color: #333;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== Layout ===== */
  .app {
    display: flex;
    height: 100vh;
  }
  .left-panel {
    width: 55%;
    min-width: 380px;
    overflow-y: auto;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    scrollbar-width: thin;
  }
  .right-panel {
    width: 45%;
    display: flex;
    flex-direction: column;
    background: #1a1a2e;
  }

  /* ===== Left Panel ===== */
  .header {
    text-align: center;
    padding: 20px 20px 6px;
    color: white;
  }
  .header h1 { font-size: 1.6rem; font-weight: 300; letter-spacing: 2px; }
  .header p { opacity: 0.8; margin-top: 4px; font-size: 0.85rem; }

  .search-area {
    max-width: 600px;
    margin: 0 auto;
    padding: 12px 20px;
  }
  .search-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-input-wrap {
    position: relative;
    flex: 1;
  }
  .search-input-wrap input {
    width: 100%;
    padding: 10px 18px;
    border: none;
    border-radius: 25px;
    font-size: 0.95rem;
    background: rgba(255,255,255,0.95);
    outline: none;
  }
  .search-input-wrap input::placeholder { color: #aaa; }
  .search-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    font-size: 0.95rem;
    background: #ff6b6b;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #ee5a5a; }

  .search-results {
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: white;
    border-radius: 12px;
    margin-top: 4px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    z-index: 1000;
    max-height: 350px;
    overflow-y: auto;
    display: none;
  }
  .search-results.show { display: block; }
  .sr-item {
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover { background: #f5f7ff; }
  .sr-item .sr-name { font-weight: 600; font-size: 0.95rem; }
  .sr-item .sr-detail { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .sr-no-result { padding: 14px; color: #999; text-align: center; font-size: 0.9rem; }

  .current-weather {
    max-width: 600px;
    margin: 12px auto;
    background: rgba(255,255,255,0.95);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }
  .cw-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .cw-city { font-size: 1.4rem; font-weight: 600; }
  .cw-city small { font-weight: 400; color: #888; font-size: 0.8rem; display: block; }
  .cw-coords { font-size: 0.7rem; color: #aaa; margin-top: 3px; font-family: monospace; }
  .cw-temp { font-size: 3.5rem; font-weight: 200; color: #444; }
  .cw-icon { font-size: 3.5rem; }
  .cw-desc { text-align: center; color: #666; margin-top: 6px; font-size: 1rem; }

  .cw-details {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 16px;
  }
  .cw-detail {
    background: #f5f7fa;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
  }
  .cw-detail .label { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
  .cw-detail .value { font-size: 1.1rem; font-weight: 600; margin-top: 3px; }

  .forecast-section {
    max-width: 600px;
    margin: 0 auto 20px;
    padding: 0 20px;
  }
  .forecast-section h2 {
    color: white;
    font-weight: 300;
    margin-bottom: 10px;
    font-size: 1.05rem;
  }

  .hourly-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
  }
  .hourly-card {
    flex-shrink: 0;
    background: rgba(255,255,255,0.9);
    border-radius: 12px;
    padding: 10px 12px;
    text-align: center;
    min-width: 70px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }
  .hourly-card .time { font-size: 0.75rem; color: #888; }
  .hourly-card .icon { font-size: 1.5rem; margin: 4px 0; }
  .hourly-card .temp { font-weight: 600; font-size: 0.95rem; }
  .hourly-card .rain { font-size: 0.7rem; color: #5b9bd5; margin-top: 2px; }
  .hourly-card .wind { font-size: 0.65rem; color: #999; margin-top: 1px; }

  .daily-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .daily-card {
    background: rgba(255,255,255,0.9);
    border-radius: 12px;
    padding: 12px 6px;
    text-align: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }
  .daily-card .day { font-size: 0.75rem; color: #666; }
  .daily-card .icon { font-size: 1.6rem; margin: 6px 0; }
  .daily-card .temps { font-size: 0.8rem; }
  .daily-card .temps .hi { font-weight: 700; color: #e74c3c; }
  .daily-card .temps .lo { color: #3498db; }
  .daily-card .rain { font-size: 0.68rem; color: #5b9bd5; margin-top: 3px; }

  .loading { text-align: center; color: white; padding: 50px; font-size: 1.1rem; }
  .loading .spinner {
    display: inline-block;
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { text-align: center; color: #ffcccc; padding: 30px; }

  .footer {
    text-align: center;
    color: rgba(255,255,255,0.5);
    padding: 12px;
    font-size: 0.7rem;
  }

  /* ===== Right Panel: Map ===== */
  .map-header {
    padding: 10px 16px;
    background: #16213e;
    color: white;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .map-header h2 { font-size: 1rem; font-weight: 400; flex: 1; }
  .breadcrumb {
    display: flex;
    gap: 4px;
    align-items: center;
    font-size: 0.8rem;
    flex-wrap: wrap;
  }
  .breadcrumb span {
    color: rgba(255,255,255,0.5);
  }
  .breadcrumb a {
    color: #8ecae6;
    cursor: pointer;
    text-decoration: none;
  }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb .current { color: white; font-weight: 600; }

  #map {
    flex: 1;
    z-index: 1;
  }

  .map-legend {
    padding: 8px 16px;
    background: #16213e;
    color: rgba(255,255,255,0.7);
    font-size: 0.75rem;
    text-align: center;
    flex-shrink: 0;
  }

  /* Custom map markers */
  .region-marker {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-radius: 12px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s;
    border: 2px solid rgba(255,255,255,0.4);
  }
  .region-marker:hover { transform: scale(1.1); }
  .region-marker small {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    opacity: 0.85;
  }

  .pref-marker {
    background: linear-gradient(135deg, #0077b6, #00b4d8);
    color: white;
    border-radius: 10px;
    padding: 5px 12px;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    cursor: pointer;
    transition: transform 0.2s;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .pref-marker:hover { transform: scale(1.1); }
  .pref-marker small {
    display: block;
    font-size: 0.6rem;
    font-weight: 400;
    opacity: 0.85;
  }

  .place-marker {
    background: white;
    color: #333;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 0.78rem;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    border: 2px solid #667eea;
  }
  .place-marker:hover { transform: scale(1.08); background: #f0f4ff; }
  .place-marker.active { background: #667eea; color: white; }
  .place-marker small {
    display: block;
    font-size: 0.6rem;
    font-weight: 400;
    color: #888;
  }
  .place-marker.active small { color: rgba(255,255,255,0.8); }

  /* Mobile */
  @media (max-width: 900px) {
    .app { flex-direction: column; }
    .left-panel { width: 100%; min-width: 0; height: 55vh; }
    .right-panel { width: 100%; height: 45vh; }
    .cw-details { grid-template-columns: repeat(4, 1fr); }
    .daily-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 600px) {
    .cw-details { grid-template-columns: repeat(2, 1fr); }
    .daily-grid { grid-template-columns: repeat(4, 1fr); }
    .cw-temp { font-size: 2.8rem; }
    .cw-icon { font-size: 2.8rem; }
  }
</style>
</head>

<div class="app">
  <!-- ===== LEFT: Weather ===== -->
  <div class="left-panel">
    <div class="header">
      <h1>🗾 日本天気予報</h1>
      <p>即時天氣 · 支援中文/日文/英文搜尋</p>
    </div>

    <div class="search-area">
      <div class="search-row">
        <div class="search-input-wrap">

          <div class="search-results" id="searchResults"></div>
        </div>
        <button class="search-btn" onclick="doSearch()">🔍</button>
      </div>
    </div>

    <div id="content">
      <div class="loading"><div class="spinner"></div><br>読み込み中...</div>
    </div>

    <div class="footer">
      Open-Meteo API（JMA model） · 每 10 分鐘自動更新 · <span id="lastUpdate">--</span>
    </div>
  </div>

  <!-- ===== RIGHT: Map ===== -->
  <div class="right-panel">
    <div class="map-header">
      <h2>🗺️ 地圖導覽</h2>
      <div class="breadcrumb" id="breadcrumb">
        <span class="current">日本全域</span>

    </div>
    <div id="map"></div>
    <div class="map-legend">點選地區 → 都道府県 → 地點 查詢天氣 ｜ OpenStreetMap</div>
  </div>
</div>

// ===== Weather Codes =====
function weatherInfo(code) {
  const m = {
    0:{icon:'☀️',desc:'快晴 Clear'},1:{icon:'🌤️',desc:'晴れ Mainly clear'},
    2:{icon:'⛅',desc:'一部曇り Partly cloudy'},3:{icon:'☁️',desc:'曇り Overcast'},
    45:{icon:'🌫️',desc:'霧 Fog'},48:{icon:'🌫️',desc:'着氷性の霧 Rime fog'},
    51:{icon:'🌦️',desc:'弱い霧雨 Light drizzle'},53:{icon:'🌦️',desc:'霧雨 Drizzle'},
    55:{icon:'🌧️',desc:'強い霧雨 Dense drizzle'},
    61:{icon:'🌧️',desc:'弱い雨 Slight rain'},63:{icon:'🌧️',desc:'雨 Rain'},
    65:{icon:'🌧️',desc:'大雨 Heavy rain'},
    71:{icon:'🌨️',desc:'弱い雪 Slight snow'},73:{icon:'🌨️',desc:'雪 Snow'},
    75:{icon:'❄️',desc:'大雪 Heavy snow'},77:{icon:'🌨️',desc:'霧雪 Snow grains'},
    80:{icon:'🌦️',desc:'にわか雨 Showers'},81:{icon:'🌧️',desc:'にわか雨 Mod. showers'},
    82:{icon:'⛈️',desc:'激しい雨 Violent showers'},
    85:{icon:'🌨️',desc:'にわか雪 Snow showers'},86:{icon:'❄️',desc:'大雪 Heavy snow showers'},
    95:{icon:'⛈️',desc:'雷雨 Thunderstorm'},
    96:{icon:'⛈️',desc:'雷雨（雹）T-storm+hail'},99:{icon:'⛈️',desc:'激しい雷雨 Heavy t-storm'},
  };
  return m[code]||{icon:'❓',desc:'Unknown'};
}
function windDir(d){const a=['N↑','NE↗','E→','SE↘','S↓','SW↙','W←','NW↖'];return a[Math.round(d/45)%8];}
const DAYS=['日','月','火','水','木','金','土'];

let mapMarkers = [];
let mapLevel = 'regions'; // 'regions' | 'prefectures' | 'places'
let currentRegionKey = null;
let currentPrefKey = null;

function clearMarkers() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];
}

// LEVEL 1: Show regions
function showRegions() {
  clearMarkers();
  mapLevel = 'regions';
  currentRegionKey = null;
  currentPrefKey = null;
  map.setView([36.5, 137.5], 5);

  for (const [name, r] of Object.entries(MAP_HIERARCHY)) {
    const prefCount = Object.keys(r.prefectures).length;
    const placeCount = Object.values(r.prefectures).reduce((s,p) => s + p.places.length, 0);
    const icon = L.divIcon({
      className: '',
      html: `<div class="region-marker">${name}<small>${prefCount}県 · ${placeCount}地點</small></div>`,
      iconSize: [0, 0],
      iconAnchor: [60, 15],
    });
    const marker = L.marker(r.center, { icon }).addTo(map);
    marker.on('click', () => showPrefectures(name));
    mapMarkers.push(marker);
  }
  updateBreadcrumb();
}

// LEVEL 2: Show prefectures within a region
function showPrefectures(regionKey) {
  clearMarkers();
  mapLevel = 'prefectures';
  currentRegionKey = regionKey;
  currentPrefKey = null;

  const region = MAP_HIERARCHY[regionKey];
  map.setView(region.center, region.zoom);

  for (const [name, pref] of Object.entries(region.prefectures)) {
    const count = pref.places.length;
    const icon = L.divIcon({
      className: '',
      html: `<div class="pref-marker">${name}<small>${count} 地點</small></div>`,
      iconSize: [0, 0],
      iconAnchor: [50, 13],
    });
    const marker = L.marker(pref.center, { icon }).addTo(map);
    marker.on('click', () => showPlaces(regionKey, name));
    mapMarkers.push(marker);
  }
  updateBreadcrumb();
}

// LEVEL 3: Show places within a prefecture
function showPlaces(regionKey, prefKey) {
  clearMarkers();
  mapLevel = 'places';
  currentRegionKey = regionKey;
  currentPrefKey = prefKey;

  const pref = MAP_HIERARCHY[regionKey].prefectures[prefKey];
  map.setView(pref.center, pref.zoom);

  for (const place of pref.places) {
    const icon = L.divIcon({
      className: '',
      html: `<div class="place-marker" id="pm-${place.lat}-${place.lon}">${place.zh}<small>${place.en}</small></div>`,
      iconSize: [0, 0],
      iconAnchor: [45, 12],
    });
    const marker = L.marker([place.lat, place.lon], { icon }).addTo(map);
    marker.on('click', () => {
      loadCityFromPlace(place, regionKey, prefKey);
    });
    mapMarkers.push(marker);
  }
  updateBreadcrumb();
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '';
  if (mapLevel === 'regions') {
    html = '<span class="current">🗾 日本全域</span>';
  } else if (mapLevel === 'prefectures') {
    html = `<a onclick="showRegions()">🗾 日本</a><span> › </span><span class="current">${currentRegionKey}</span>`;
  } else {
    html = `<a onclick="showRegions()">🗾 日本</a><span> › </span><a onclick="showPrefectures('${currentRegionKey}')">${currentRegionKey}</a><span> › </span><span class="current">${currentPrefKey}</span>`;
  }
  bc.innerHTML = html;
}

function highlightMarker(lat, lon) {
  document.querySelectorAll('.place-marker.active').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`pm-${lat}-${lon}`);
  if (el) el.classList.add('active');
}

// ===== Weather API =====
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl`
    + `&hourly=temperature_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,sunrise,sunset,wind_speed_10m_max,uv_index_max`
    + `&models=jma_seamless`
    + `&timezone=Asia%2FTokyo&forecast_days=7`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

// ===== Render Weather =====
function renderWeather(data, city) {
  const c = data.current;
  const w = weatherInfo(c.weather_code);
  const hourly = data.hourly;
  const daily = data.daily;

  let si = hourly.time.findIndex(t => t >= new Date().toISOString().slice(0,13));
  if (si < 0) si = 0;

  let hHTML = '';
  for (let i = si; i < Math.min(si+24, hourly.time.length); i++) {
    const t = new Date(hourly.time[i]);
    const hw = weatherInfo(hourly.weather_code[i]);
    const pr = hourly.precipitation[i]??0;
    hHTML += `<div class="hourly-card">
      <div class="time">${t.getHours()}:00</div>
      <div class="icon">${hw.icon}</div>
      <div class="temp">${hourly.temperature_2m[i].toFixed(1)}°</div>
      <div class="rain">💧${hourly.precipitation_probability[i]!=null?hourly.precipitation_probability[i]+'%':'--'}</div>
      ${pr>0?`<div class="wind">🌧${pr.toFixed(1)}mm</div>`:''}
      <div class="wind">💨${hourly.wind_speed_10m[i]}km/h</div>
    </div>`;
  }

  let dHTML = '';
  for (let i = 0; i < daily.time.length; i++) {
    const d = new Date(daily.time[i]+'T00:00');
    const dw = weatherInfo(daily.weather_code[i]);
    const dl = i===0?'今日':i===1?'明日':`${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;
    const uv = daily.uv_index_max?daily.uv_index_max[i]:null;
    dHTML += `<div class="daily-card">
      <div class="day">${dl}</div>
      <div class="icon">${dw.icon}</div>
      <div class="temps"><span class="hi">${Math.round(daily.temperature_2m_max[i])}°</span>/<span class="lo">${Math.round(daily.temperature_2m_min[i])}°</span></div>
      <div class="rain">💧${daily.precipitation_probability_max[i]!=null?daily.precipitation_probability_max[i]+'%':'--'}</div>
      ${uv!=null?`<div class="rain">UV${uv.toFixed(1)}</div>`:''}
    </div>`;
  }

  const sr = daily.sunrise[0]?new Date(daily.sunrise[0]).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'--';
  const ss = daily.sunset[0]?new Date(daily.sunset[0]).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'--';
  const coords = `${city.lat.toFixed(4)}°N, ${city.lon.toFixed(4)}°E` + (city.elev!=null?` · 標高 ${Math.round(city.elev)}m`:'');

  document.getElementById('content').innerHTML = `
    <div class="current-weather">
      <div class="cw-top">
        <div>
          <div class="cw-city">${city.name}<small>${city.sub}</small></div>
          <div class="cw-coords">📍 ${coords}</div>
        </div>
        <div class="cw-icon">${w.icon}</div>
        <div class="cw-temp">${c.temperature_2m.toFixed(1)}°C</div>
      </div>
      <div class="cw-desc">${w.desc}　｜　体感 ${c.apparent_temperature.toFixed(1)}°C</div>
      <div class="cw-details">
        <div class="cw-detail"><div class="label">湿度</div><div class="value">${c.relative_humidity_2m}%</div></div>
        <div class="cw-detail"><div class="label">降水</div><div class="value">${c.precipitation.toFixed(1)}mm</div></div>
        <div class="cw-detail"><div class="label">風速</div><div class="value">${c.wind_speed_10m}km/h</div></div>
        <div class="cw-detail"><div class="label">風向</div><div class="value">${windDir(c.wind_direction_10m)}</div></div>
        <div class="cw-detail"><div class="label">気圧</div><div class="value">${Math.round(c.pressure_msl)}hPa</div></div>
        <div class="cw-detail"><div class="label">🌅日出</div><div class="value">${sr}</div></div>
        <div class="cw-detail"><div class="label">🌇日落</div><div class="value">${ss}</div></div>
        <div class="cw-detail"><div class="label">高/低</div><div class="value" style="color:#e74c3c">${Math.round(daily.temperature_2m_max[0])}°<span style="color:#3498db">/${Math.round(daily.temperature_2m_min[0])}°</span></div></div>
      </div>
    </div>
    <div class="forecast-section">
      <h2>⏱ 毎時予報（24h）</h2>
      <div class="hourly-scroll">${hHTML}</div>
    </div>
    <div class="forecast-section">
      <h2>📅 週間予報（7日）</h2>
      <div class="daily-grid">${dHTML}</div>
    </div>`;
  document.getElementById('lastUpdate').textContent = new Date().toLocaleString('ja-JP');
}

// ===== Load City =====
async function loadCity(lat, lon, name, sub, elev) {
  currentLocation = { lat, lon, name, sub: sub||'', elev };
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><br>読み込み中...</div>';
  try {
    const data = await fetchWeather(lat, lon);
    renderWeather(data, currentLocation);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error">⚠️ ${e.message}</div>`;
  }
}

function loadCityFromPlace(place, regionKey, prefKey) {
  highlightMarker(place.lat, place.lon);
  const sub = `${place.ja} / ${place.en} ｜ ${prefKey}（${regionKey}）`;
  loadCity(place.lat, place.lon, place.zh, sub, place.elev);
  // Also pan map to place
  map.panTo([place.lat, place.lon]);
}

// ===== Text Search =====
function searchLocal(q) {
  const s = q.toLowerCase().trim();
  if (!s) return [];
  return ALL_PLACES.filter(p =>
    p.zh.toLowerCase().includes(s) ||
    p.ja.toLowerCase().includes(s) ||
    p.en.toLowerCase().includes(s) ||
    p.region.toLowerCase().includes(s) ||
    p.pref.toLowerCase().includes(s)
  );
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const results = searchLocal(q);
  if (results.length === 1) {
    const p = results[0];
    document.getElementById('searchResults').classList.remove('show');
    // Navigate map to the place
    showPlaces(p.region, p.pref);
    loadCityFromPlace(p, p.region, p.pref);
  } else if (results.length > 0) {
    showLocalResults(results);
  } else {
    // Fallback: API
    try {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=ja&format=json`;
      const res = await fetch(url);
      const data = await res.json();
      const jp = (data.results||[]).filter(r => r.country_code==='JP');
      if (jp.length > 0) showAPIResults(jp);
      else showNoResult(q);
    } catch { showNoResult(q); }
  }
}

let _localCache = [];
function showLocalResults(results) {
  _localCache = results.slice(0, 12);
  const c = document.getElementById('searchResults');
  c.innerHTML = _localCache.map((p, i) => `
    <div class="sr-item" onclick="selectLocalByIndex(${i})">
      <div class="sr-name">${p.zh}（${p.ja}）</div>
      <div class="sr-detail">${p.region} › ${p.pref} ｜ ${p.en} ｜ 標高 ${p.elev}m</div>
    </div>`).join('');
  c.classList.add('show');
}
function selectLocalByIndex(i) {
  const p = _localCache[i];
  if (!p) return;
  document.getElementById('searchResults').classList.remove('show');
  showPlaces(p.region, p.pref);
  const place = MAP_HIERARCHY[p.region].prefectures[p.pref].places.find(x => x.lat===p.lat && x.lon===p.lon);
  if (place) loadCityFromPlace(place, p.region, p.pref);
}

let _apiCache = [];
function showAPIResults(results) {
  _apiCache = results;
  const c = document.getElementById('searchResults');
  c.innerHTML = results.map((r, i) => {
    const admin = [r.admin1,r.admin2].filter(Boolean).join(' › ');
    const elev = r.elevation!=null?Math.round(r.elevation):0;
    return `<div class="sr-item" onclick="selectAPIResult(${i})">
      <div class="sr-name">${r.name}</div>
      <div class="sr-detail">${admin} ｜ ${r.latitude.toFixed(3)}°N ｜ 標高 ${elev}m</div>
    </div>`;
  }).join('');
  c.classList.add('show');
}
function selectAPIResult(i) {
  const r = _apiCache[i];
  if (!r) return;
  const admin = [r.admin1,r.admin2].filter(Boolean).join(' › ');
  const elev = r.elevation!=null?Math.round(r.elevation):0;
  document.getElementById('searchResults').classList.remove('show');
  loadCity(r.latitude, r.longitude, r.name, admin, elev);
  map.setView([r.latitude, r.longitude], 11);
}

function showNoResult(q) {
  const c = document.getElementById('searchResults');
  c.innerHTML = `<div class="sr-no-result">「${q}」找不到結果，試試日文或英文名稱</div>`;
  c.classList.add('show');
}


// ===== Init =====
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(this._d);
  const q = this.value.trim();
  if (q.length < 1) { document.getElementById('searchResults').classList.remove('show'); return; }
  this._d = setTimeout(() => {
    const r = searchLocal(q);
    if (r.length > 0) showLocalResults(r);
    else document.getElementById('searchResults').classList.remove('show');
  }, 200);
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key==='Enter') { e.preventDefault(); doSearch(); }
});
document.getElementById('searchInput').addEventListener('blur', () => {
  setTimeout(() => document.getElementById('searchResults').classList.remove('show'), 200);
});

// Show regions on map
showRegions();

loadCity(35.68, 139.69, '東京', '東京 / Tokyo ｜ 東京都（関東）', 40);

// Auto-refresh
setInterval(() => {
  if (currentLocation) loadCity(currentLocation.lat, currentLocation.lon, currentLocation.name, currentLocation.sub, currentLocation.elev);
}, 600000);
</script>
